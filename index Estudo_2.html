<!DOCTYPE html>
<html lang="pt-br">

<head>
    <!-- METADADOS -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- TÍTULO -->
    <title>Tutorial Sevenbee</title>

    <!-- FONTE (CORRIGIDO) -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        /* BODY */
        body {
            max-width: 900px;
            margin: 0 auto;
            padding: 15px;
            font-family: "Poppins", sans-serif;
            background-color: #f5f5f5;
        }

        /* TÍTULO PRINCIPAL */
        h1 {
            background-color: #70388d;
            text-align: center;
            color: white;
            font-size: 20px;
            padding: 10px;
            border-radius: 6px;
        }

        /* SUBTÍTULO */
        h2 {
            text-align: center;
            color: white;
            background-color: #5d0e85;
            font-size: 18px;
            padding: 8px;
            border-radius: 6px;
        }

        /* TEXTO */
        p {
            font-size: 14px;
            color: #70388d;
            text-align: justify;
            line-height: 1.5;
        }

        /* IMAGENS */
        img {
            display: block;
            margin: 15px auto;
            max-width: 100%;
        }

        .no-border {
            border: none;
        }

        /* VÍDEO RESPONSIVO (CORRIGIDO) */
        .video-container {
            position: relative;
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
        }

        .video-container iframe {
            width: 100%;
            height: 280px;
            border-radius: 10px;
        }

        /* BOTÃO VOLTAR */
        .voltar {
            display: block;
            text-align: center;
            margin-top: 25px;
            font-size: 16px;
            text-decoration: none;
            color: #70388d;
            font-weight: 600;
            transition: 0.3s;
        }

        .voltar:hover {
            color: #5d0e85;
            transform: scale(1.05);
        }

        /* RODAPÉ */
        #rodape {
            text-align: center;
            font-size: 12px;
            color: #70388d;
            margin-top: 25px;
        }
    </style>

</head>

<script>
    function voltarTela() {
        // Se tiver histórico, volta
        if (window.history.length > 1) {
            window.history.back();
        } else {
            // Se não tiver, vai para tela inicial
            window.location.href = "index.html";
        }
    }
</script>

<body>

    <!-- TÍTULOS -->
    <h1>O que é o 7bee?</h1>
    <h2>Por que usamos o 7bee?</h2>

    <hr>
    <hr><br><br>



    <!-- TEXTO -->
    <p>
        <strong>

        </strong>
    </p>

    <!-- LOGO -->
    <img class="no-border" src="src/images/LOGO 7bee.png" alt="Logo 7bee" width="150px"><br><br>


    <!-- VÍDEO -->
    <div class="video-container">
        <iframe src="https://www.youtube.com/embed/DS3SFwTm-i8?si=IMPb4xNMiJkmVbHu" title="Vídeo 7bee" frameborder="0"
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
            allowfullscreen>
        </iframe>
    </div>

    <!-- BOTÃO VOLTAR -->
    <a href="index.html" class="voltar" onclick="voltarTela()">⬅ Voltar para tela inicial</a><br><br>

   <!-- IMAGEM -->
    <img src="src\images\Logo Educação-1.png" alt="Educação" width="100px">
    <!-- RODAPÉ -->
    <footer id="rodape">
        Departamento de Educação Adventista - AAmaR <br>
        © 2026 - Todos os Direitos Reservados.
    </footer>

</body>

</html>
